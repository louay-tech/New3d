<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    #btn {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px 40px; font-size: 24px;
      background: #ff6600; color: white;
      border: none; border-radius: 15px;
      z-index: 9999;
    }
  </style>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image.prod.js"></script>
</head>
<body>
  <button id="btn" onclick="startAR()">🍕 ابدأ AR</button>
  <div id="container" style="width:100%;height:100%;display:none;">
    <a-scene mindar-image="imageTargetSrc: targets.mind;"
             color-space="sRGB"
             embedded
             vr-mode-ui="enabled: false"
             id="scene">
      <a-assets>
        <a-asset-item id="model" src="pizza.glb"></a-asset-item>
      </a-assets>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model src="#model" scale="0.5 0.5 0.5" position="0 0 0"></a-gltf-model>
      </a-entity>
    </a-scene>
  </div>
  <script>
    function startAR() {
      document.getElementById('btn').style.display = 'none';
      document.getElementById('container').style.display = 'block';
    }
  </script>
</body>
</html>
