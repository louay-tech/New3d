<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    #startBtn {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px 40px; font-size: 22px;
      background: #ff6600; color: white;
      border: none; border-radius: 15px;
      z-index: 9999; cursor: pointer;
    }
  </style>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image.prod.js"></script>
</head>
<body>
  <button id="startBtn" onclick="document.getElementById('startBtn').style.display='none'">
    🍕 ابدأ AR
  </button>
  <a-scene mindar-image="imageTargetSrc: targets.mind; autoStart: false;"
           color-space="sRGB"
           embedded
           vr-mode-ui="enabled: false"
           device-orientation-permission-ui="enabled: true"
           id="scene">
    <a-assets>
      <a-asset-item id="model" src="pizza.glb"></a-asset-item>
    </a-assets>
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model src="#model" scale="0.5 0.5 0.5" position="0 0 0"></a-gltf-model>
    </a-entity>
  </a-scene>
  <script>
    document.getElementById('startBtn').addEventListener('click', function() {
      const scene = document.getElementById('scene');
      scene.components['mindar-image'].startAR();
    });
  </script>
</body>
</html>
